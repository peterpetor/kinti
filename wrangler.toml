#:schema node_modules/wrangler/config-schema.json
# ---------------------------------------------------------------------------
# Kinti — Cloudflare Pages konfiguráció (Next.js + @cloudflare/next-on-pages)
# ---------------------------------------------------------------------------
# A `nodejs_compat` flag kell a Next.js Edge runtime-jának. A build kimenete a
# next-on-pages konvenciója szerint a `.vercel/output/static` mappába kerül.
# A bindingek (DB, MEDIA) helyi fejlesztésnél a `getRequestContext().env`-en
# keresztül érhetők el — lásd src/lib/cloudflare.ts (2. lépésben).
# ---------------------------------------------------------------------------

name = "kinti"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# --- D1: relációs adatbázis (categories, businesses, events, reviews) ---
[[d1_databases]]
binding = "DB"
database_name = "kinti-db"
database_id = "ec70d0d2-1b7c-416d-a2c6-c5d15c3e59a2"
migrations_dir = "db/migrations"

# --- R2: média (vállalkozói logók, hirdetés-képek) ---
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "kinti-media"
preview_bucket_name = "kinti-media-preview"

# --- Build-időben NEM titkos környezeti változók ---
[vars]
NEXT_PUBLIC_APP_NAME = "kinti"
# R2 publikus URL (opcionális). Ha üres → a képek a Worker /api/media proxyján át
# szolgálódnak (mindig működik, nincs DNS-beállítás). Ha beállítod, gyorsabb CDN-en
# át megy, DE előtte a domaint Cloudflare Pages → R2 bucket → Custom Domain
# alatt valódi DNS-szel és R2 publikus hozzáférést be kell kötnöd.
NEXT_PUBLIC_R2_PUBLIC_URL = ""
# Cloudflare Web Analytics beacon (üresen marad addig, amíg a CF dashboardon
# ki nem generálod a tokent: Analytics & Logs → Web Analytics → Add a site).
# Ha üres, a script egyáltalán nem renderelődik — semmilyen kérés nem megy ki.
NEXT_PUBLIC_CF_BEACON_TOKEN = ""
# MapTiler API-kulcs a térkép vektor-stílusához (opcionális). Ha üres, a
# térkép az ingyenes, kulcs nélküli OpenFreeMap stílust használja.
# Kulcs: https://cloud.maptiler.com → Account → Keys (free, 100k load/hó).
NEXT_PUBLIC_MAPTILER_KEY = ""

# A valódi titkok (pl. CLERK_SECRET_KEY) továbbra is a Cloudflare Dashboardon 
# vagy a 'wrangler pages secret put' paranccsal kerülnek beállításra.
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsua2ludGkuYXBwJA"
NEXT_PUBLIC_CLERK_SIGN_IN_URL = "/belepes"
NEXT_PUBLIC_CLERK_SIGN_UP_URL = "/regisztracio"
NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/profil"
NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/profil"

# --- Cloudflare Workers AI binding ---
[ai]
binding = "AI"

