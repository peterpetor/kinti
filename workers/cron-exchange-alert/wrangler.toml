#:schema node_modules/wrangler/config-schema.json
# ---------------------------------------------------------------------------
# kinti-cron-exchange-alert — óránkénti push-cron (árfolyam + esemény-emlékeztető).
#
# Óránként lefutva: (A) ellenőrzi a CHF/HUF árfolyam-küszöböket
# (`exchange_rate_alerts`), és (B) kiküldi az esedékes esemény-RSVP
# emlékeztetőket (`event_reminders`). Mindkettő payload-mentes push.
#
# Deploy:
#   cd workers/cron-exchange-alert
#   npx wrangler deploy
# ---------------------------------------------------------------------------

name = "kinti-cron-exchange-alert"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Óránként 13. percben — direkt nem kerek időpont
[triggers]
crons = ["13 * * * *"]

# Ugyanaz a D1, mint a Pages projekt
[[d1_databases]]
binding = "DB"
database_name = "kinti-db"
database_id = "ec70d0d2-1b7c-416d-a2c6-c5d15c3e59a2"

[observability]
enabled = true

# Szükséges titkok:
#   VAPID_PRIVATE_KEY  — a payload-mentes push VAPID JWT aláírásához
#   VAPID_PUBLIC_KEY   — uppercase a JWT k= header-ben
#   VAPID_SUBJECT      — pl. "mailto:info@kinti.app"
# Beállítás:
#   cd workers/cron-exchange-alert
#   npx wrangler secret put VAPID_PRIVATE_KEY
#   npx wrangler secret put VAPID_PUBLIC_KEY
#   npx wrangler secret put VAPID_SUBJECT
